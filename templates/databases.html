<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声紋データベース管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">🗂️ 声紋データベース管理</h1>
                <a href="/" class="text-sm text-purple-600 hover:text-purple-700 underline">
                    ← トップに戻る
                </a>
            </div>
            <p class="mt-2 text-sm text-gray-500">
                ルートディレクトリ: <code class="bg-gray-200 px-2 py-0.5 rounded">{{ root }}</code>
            </p>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">データベース一覧</h2>

                <div id="db-list">
                    {% include "partials/db_list.html" %}
                </div>

                <div class="mt-6 pt-5 border-t border-gray-100">
                    <h3 class="text-sm font-medium text-gray-700 mb-2">新規DBを作成</h3>
                    <form hx-post="/api/databases"
                          hx-target="#db-list"
                          hx-swap="innerHTML"
                          hx-on::after-request="if(event.detail.successful){this.reset(); htmx.trigger('body', 'db-changed');}"
                          class="flex gap-2">
                        <input type="text" name="name" placeholder="例: 転スラ"
                               required
                               class="flex-1 text-sm border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-purple-400 focus:outline-none">
                        <button type="submit"
                                class="text-sm bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded">
                            作成
                        </button>
                    </form>
                </div>
            </div>

            <div id="db-detail">
                <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-6 text-center text-gray-400 italic">
                    左のリストからDBを選択してください。
                </div>
            </div>
        </div>
    </div>

    {# 切り出し（トリミング）モーダル #}
    <div id="db-trim-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
        <div class="bg-white rounded-2xl shadow-2xl border border-gray-100 w-full max-w-2xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-900">✂ 声の切り出し
                    <span id="db-trim-title" class="text-sm font-normal text-gray-500"></span>
                </h3>
                <button type="button" onclick="closeDbTrim()"
                        class="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
            </div>

            <div class="p-3 bg-gray-50 border border-gray-200 rounded">
                <div id="crop-wave-dbtrim" class="w-full"></div>
                <div class="flex flex-wrap items-center gap-2 mt-2 text-xs text-gray-600">
                    <label class="font-medium">開始(秒)</label>
                    <input type="number" step="0.01" min="0" id="crop-start-dbtrim"
                           class="w-24 border border-gray-300 rounded px-1.5 py-0.5">
                    <label class="font-medium">終了(秒)</label>
                    <input type="number" step="0.01" min="0" id="crop-end-dbtrim"
                           class="w-24 border border-gray-300 rounded px-1.5 py-0.5">
                    <button type="button"
                            onclick="cropEditors['dbtrim'] && cropEditors['dbtrim'].playSelection()"
                            class="bg-purple-100 hover:bg-purple-200 text-purple-700 rounded px-2 py-0.5">
                        ▶ 選択範囲を試聴
                    </button>
                    <button type="button"
                            onclick="cropEditors['dbtrim'] && cropEditors['dbtrim'].reset()"
                            class="text-gray-500 hover:text-gray-700 underline">全体に戻す</button>
                </div>
                <p class="text-[11px] text-gray-400 mt-1">
                    波形をドラッグするか数値を入力して、残したい範囲を選択してください。
                    保存すると元ファイルは選択範囲で<strong>上書き</strong>されます。
                </p>
            </div>

            <div class="mt-5 flex justify-end gap-2">
                <button type="button" onclick="closeDbTrim()"
                        class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded">
                    キャンセル
                </button>
                <button type="button" id="db-trim-save" onclick="submitDbTrim()"
                        class="text-sm bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded">
                    切り出して上書き保存
                </button>
            </div>
        </div>
    </div>

    {% include "partials/crop_editor_script.html" %}

    <script>
        // ===== 切り出しモーダル制御 =====
        let _dbTrimTarget = { db: null, file: null };

        function openDbTrim(db, file, speakerName, mtime) {
            _dbTrimTarget = { db, file };
            document.getElementById('db-trim-title').textContent = '— ' + speakerName;
            document.getElementById('db-trim-modal').classList.remove('hidden');
            const url = '/api/databases/' + encodeURIComponent(db)
                      + '/speakers/' + encodeURIComponent(file) + '/audio'
                      + '?v=' + (mtime || Date.now());
            // モジュール読込が完了していない一瞬を考慮して軽くリトライ
            const tryInit = () => {
                if (window.initCropEditor) { window.initCropEditor('dbtrim', url); }
                else { setTimeout(tryInit, 60); }
            };
            tryInit();
        }

        function closeDbTrim() {
            document.getElementById('db-trim-modal').classList.add('hidden');
            if (window.cropEditors && window.cropEditors['dbtrim'] && window.cropEditors['dbtrim'].ws) {
                try { window.cropEditors['dbtrim'].ws.destroy(); } catch (e) {}
                delete window.cropEditors['dbtrim'];
            }
        }

        async function submitDbTrim() {
            const { db, file } = _dbTrimTarget;
            if (!db || !file) return;
            const saveBtn = document.getElementById('db-trim-save');
            const fd = new FormData();
            fd.append('start', document.getElementById('crop-start-dbtrim').value);
            fd.append('end', document.getElementById('crop-end-dbtrim').value);
            const url = '/api/databases/' + encodeURIComponent(db)
                      + '/speakers/' + encodeURIComponent(file) + '/trim';
            saveBtn.disabled = true;
            saveBtn.textContent = '処理中…';
            try {
                const res = await fetch(url, { method: 'POST', body: fd });
                const html = await res.text();
                const detail = document.getElementById('db-detail');
                detail.innerHTML = html;
                if (window.htmx) htmx.process(detail);
                notifyDbChanged();
                closeDbTrim();
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '切り出して上書き保存';
            }
        }

        // 他タブ（Step 1 画面など）にDB変更を通知
        const _vdbChannel = ('BroadcastChannel' in window) ? new BroadcastChannel('voice-databases') : null;
        function notifyDbChanged() {
            if (_vdbChannel) _vdbChannel.postMessage({ type: 'changed', at: Date.now() });
        }
        document.body.addEventListener('htmx:afterRequest', (e) => {
            if (!e.detail.successful) return;
            const path = (e.detail.requestConfig && e.detail.requestConfig.path) || '';
            const verb = ((e.detail.requestConfig && e.detail.requestConfig.verb) || '').toUpperCase();
            // DB作成/削除、話者追加/削除のいずれかで通知
            if (verb === 'POST' && path === '/api/databases') notifyDbChanged();
            else if (path.startsWith('/api/databases/') && path.includes('/speakers')) notifyDbChanged();
        });
    </script>
</body>
</html>
