<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未登録話者のラベル付け - Job {{ job.job_id }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">🔍 未登録話者のラベル付け</h1>
                <a href="/" class="text-sm text-purple-600 hover:text-purple-700 underline">
                    ← トップに戻る
                </a>
            </div>
            <p class="mt-2 text-sm text-gray-500">
                文字起こしCSV: <code class="bg-gray-200 px-2 py-0.5 rounded">{{ job.csv_filename }}</code>
                · 生成日時: {{ job.created_at }}
            </p>
            <p class="mt-1 text-xs text-gray-500">
                クラスタ音声を聴いて話者名を入力 →
                <strong>保存先DB</strong> に <code>{名前}.wav</code> として永続化 →
                残りのUnknown を新DBで自動再照合 → CSV の <code>Unknown_NN</code> を新名に置換します。
            </p>
        </header>

        <div id="unknowns-list" class="bg-white rounded-2xl shadow-xl border border-gray-100 p-6">
            {% include "partials/unknowns_list.html" %}
        </div>
    </div>
</body>
</html>
