<div class="bg-white rounded-lg border border-gray-200 p-4">
    <h3 class="text-lg font-bold text-gray-900 mb-3 flex items-center justify-between">
        <span>📁 {{ db_name }}</span>
        <span class="text-xs font-normal text-gray-500">{{ speakers|length }} 話者</span>
    </h3>

    {% if speakers %}
    <ul class="divide-y divide-gray-100">
        {% for s in speakers %}
        <li class="py-3 flex items-center justify-between gap-3">
            <div class="flex-1 min-w-0">
                <p class="font-medium text-gray-800 truncate">{{ s.speaker_name }}</p>
                <p class="text-xs text-gray-400">{{ s.filename }} · {{ (s.size_bytes / 1024)|round(1) }} KB</p>
            </div>
            <audio controls preload="none" class="h-8" style="max-width:220px">
                <source src="/api/databases/{{ db_name }}/speakers/{{ s.filename }}/audio?v={{ s.mtime }}">
            </audio>
            <button type="button"
                    onclick="openDbRename('{{ db_name }}', '{{ s.filename }}', '{{ s.speaker_name }}')"
                    class="text-xs text-blue-600 hover:text-blue-800 underline whitespace-nowrap">
                名前変更
            </button>
            <button type="button"
                    onclick="openDbTrim('{{ db_name }}', '{{ s.filename }}', '{{ s.speaker_name }}', {{ s.mtime }})"
                    class="text-xs text-purple-600 hover:text-purple-800 underline whitespace-nowrap">
                編集
            </button>
            <button type="button"
                    hx-delete="/api/databases/{{ db_name }}/speakers/{{ s.filename }}"
                    hx-target="#db-detail"
                    hx-swap="innerHTML"
                    hx-confirm="「{{ s.speaker_name }}」を削除しますか？"
                    class="text-xs text-red-600 hover:text-red-800 underline">
                削除
            </button>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-sm text-gray-400 italic">このDBには話者がまだ登録されていません。</p>
    {% endif %}

    <div class="mt-5 pt-4 border-t border-gray-100">
        <h4 class="text-sm font-medium text-gray-700 mb-2">話者を追加</h4>
        <form hx-post="/api/databases/{{ db_name }}/speakers/upload"
              hx-target="#db-detail"
              hx-swap="innerHTML"
              hx-encoding="multipart/form-data">
            <input type="file" name="files" multiple
                   accept=".wav,.mp3,.m4a,.flac,.mp4,.mov,.ogg,.opus,.aac,.wma" required
                   class="block w-full text-xs text-gray-500 file:mr-3 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100 mb-2">
            <button type="submit"
                    class="text-xs bg-purple-600 hover:bg-purple-700 text-white font-medium py-1 px-3 rounded">
                アップロード
            </button>
        </form>
        <p class="text-xs text-gray-400 mt-1">ファイル名（拡張子除く）が話者名になります。同名は上書き。</p>
    </div>
</div>
